server:
  port: 8081
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docqa}
    username: ${SPRING_DATASOURCE_USERNAME:docqa}
    password: ${SPRING_DATASOURCE_PASSWORD:docqa-password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key}
  expiration-ms: 900000
  refresh-expiration-ms: 2592000000
