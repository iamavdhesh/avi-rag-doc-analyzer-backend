apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: enterprise-docqa
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: enterprise-docqa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: enterprise-docqa/api-gateway-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: DOCUMENT_SERVICE_URL
              value: "http://document-ingestion-service:8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: enterprise-docqa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: enterprise-docqa/auth-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/docqa"
            - name: SPRING_DATASOURCE_USERNAME
              value: "docqa"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "docqa-password"
            - name: JWT_SECRET
              value: "super-secret-jwt-key"
