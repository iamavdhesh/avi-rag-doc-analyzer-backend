server:
  port: 8083
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docqa}
    username: ${SPRING_DATASOURCE_USERNAME:docqa}
    password: ${SPRING_DATASOURCE_PASSWORD:docqa-password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  group-id: embedding-service-group
openai:
  api-key: ${OPENAI_API_KEY}
  embeddings-model: text-embedding-3-large
