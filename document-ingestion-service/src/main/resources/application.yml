server:
  port: 8082
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docqa}
    username: ${SPRING_DATASOURCE_USERNAME:docqa}
    password: ${SPRING_DATASOURCE_PASSWORD:docqa-password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topic:
    document-uploaded: document-uploaded
storage:
  path: ${STORAGE_PATH:/tmp/uploads}
