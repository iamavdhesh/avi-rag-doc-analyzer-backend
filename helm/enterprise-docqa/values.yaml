replicaCount: 2

image:
  repository: enterprise-docqa
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

global:
  postgres:
    url: jdbc:postgresql://postgres:5432/docqa
    username: docqa
    password: docqa-password
  kafka:
    bootstrapServers: kafka:9092
  redis:
    url: redis://redis:6379

services:
  apiGateway:
    enabled: true
    name: api-gateway
    port: 8080
  authService:
    enabled: true
    name: auth-service
    port: 8081
  documentIngestionService:
    enabled: true
    name: document-ingestion-service
    port: 8082
