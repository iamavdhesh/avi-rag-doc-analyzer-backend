apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.apiGateway.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.services.apiGateway.port }}
      targetPort: {{ .Values.services.apiGateway.port }}
  selector:
    app: {{ .Values.services.apiGateway.name }}
